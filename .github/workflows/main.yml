name: Build itlwm (Optimized)

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUILD_OUTPUT: 'build/Build/Products/Release'
  XCODE_FLAGS: '-sdk macosx MACOSX_DEPLOYMENT_TARGET=10.12 CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 5

    - name: Extract Version
      run: |
        git fetch --prune --unshallow --tags || true
        GIT_SHA="$(git rev-parse --short HEAD)"
        eval $(grep -m 1 "MODULE_VERSION =" itlwm.xcodeproj/project.pbxproj | tr -d '; \t')
        echo "SHORT_SHA=$GIT_SHA" >> $GITHUB_ENV
        echo "ITLWM_VER=$MODULE_VERSION" >> $GITHUB_ENV

    - name: Cache MacKernelSDK
      uses: actions/cache@v4
      with:
        path: MacKernelSDK
        key: ${{ runner.os }}-mackernelsdk-${{ hashFiles('MacKernelSDK/**') }}
        restore-keys: ${{ runner.os }}-mackernelsdk-

    - name: Install MacKernelSDK
      run: |
        if [ ! -d "MacKernelSDK/.git" ]; then
          git clone --depth=1 https://github.com/acidanthera/MacKernelSDK.git
        fi

    - name: Verify MacKernelSDK
      run: |
        test -d MacKernelSDK/Headers || (echo "ERROR: MacKernelSDK no clonado" && exit 1)
        grep -q "__ACIDANTHERA_MAC_SDK" MacKernelSDK/Headers/Availability.h || (echo "ERROR: MacKernelSDK inválido" && exit 1)

    - name: Build itlwm.kext
      run: |
        xcodebuild -scheme itlwm -configuration Release -derivedDataPath build -destination "generic/platform=macOS" $XCODE_FLAGS GIT_COMMIT=_${SHORT_SHA} 2>&1 | tee build.log | xcpretty || (cat build.log && exit 1)

    - name: Package Artifact
      run: |
        mkdir -p dist
        cd "$BUILD_OUTPUT"
        zip -r "../dist/itlwm-v${ITLWM_VER}-RELEASE-${SHORT_SHA}.zip" itlwm.kext

    - name: Publish Release
      uses: ncipollo/release-action@v1.12.0
      with:
        prerelease: false
        artifacts: "dist/*.zip"
        tag: "v${ITLWM_VER}-release-${SHORT_SHA}"
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
