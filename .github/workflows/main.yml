name: Build itlwm (Optimized)

on:
  workflow_dispatch:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUILD_OUTPUT: 'build/Build/Products/Release'
  MACOSX_DEPLOYMENT_TARGET: '10.13'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 5

    - name: Manage Version
      run: |
        git fetch --prune --unshallow --tags || true
        GIT_SHA="$(git rev-parse --short HEAD)"
        eval $(grep -m 1 "MODULE_VERSION =" itlwm.xcodeproj/project.pbxproj | tr -d '; \t')
        echo "SHORT_SHA=$GIT_SHA" >> $GITHUB_ENV
        echo "ITLWM_VER=$MODULE_VERSION" >> $GITHUB_ENV

    - name: Cache MacKernelSDK
      uses: actions/cache@v4
      with:
        path: MacKernelSDK
        key: ${{ runner.os }}-mackernelsdk-${{ hashFiles('MacKernelSDK/**') }}
        restore-keys: ${{ runner.os }}-mackernelsdk-

    - name: Install MacKernelSDK
      run: |
        if [ ! -d "MacKernelSDK/.git" ]; then
          git clone --depth=1 https://github.com/acidanthera/MacKernelSDK.git
        fi

    - name: Build itlwm
      run: |
        xcodebuild -scheme itlwm -configuration Release -derivedDataPath build -destination "generic/platform=macOS" MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET GIT_COMMIT=_${SHORT_SHA} CODE_SIGNING_ALLOWED=NO | xcpretty && exit ${PIPESTATUS[0]}

    - name: Pack Artifacts
      run: |
        cd $BUILD_OUTPUT
        zip -r itlwm-v${ITLWM_VER}-RELEASE-${SHORT_SHA}.zip itlwm.kext
        cd -

    - name: Publish Release
      uses: ncipollo/release-action@v1.12.0
      with:
        prerelease: false
        artifacts: "${{ env.BUILD_OUTPUT }}/*.zip"
        tag: "v${ITLWM_VER}-release-${SHORT_SHA}"
        token: ${{ secrets.GITHUB_TOKEN }}
        allowUpdates: true
